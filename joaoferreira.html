<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato - Matheus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    .card {
      max-width: 420px;
      margin: 40px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 14px;
    }
    .label {
      font-size: 0.8rem;
      color: #777;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .value {
      font-size: 1rem;
    }
    .value a {
      color: #0066cc;
      text-decoration: none;
    }
    .value a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Sabrina Ferreira Leite</h1>

    <div class="field">
      <div class="label">Adresse</div>
      <div class="value">
        Via Lavada 7 7013 Domat Ems
      </div>
    </div>

    <div class="field">
      <div class="label">Telefonnummer</div>
      <div class="value">
        <a href="tel:+41797361559">+41 79 736 15 59</a>
      </div>
    </div>
  </div>

  <div class="card">
    <h1>João Ferreira Leite</h1>

    <div class="field">
      <div class="label">Telefonnummer</div>
      <div class="value">
        <a href="tel:+41789017433">+41 78 901 74 33</a>
      </div>
    </div>
  </div>

</body>
</html>
